<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Claude Code 学習コース</title>
  <style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c-bg: #f7f8fc;
  --c-surface: #ffffff;
  --c-primary: #5b4fcf;
  --c-primary-light: #ede9ff;
  --c-accent: #ff6b35;
  --c-text: #1a1a2e;
  --c-text-sub: #6b7280;
  --c-border: #e5e7eb;
  --c-success: #22c55e;
  --c-error: #ef4444;
  --c-warning: #f59e0b;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,.10);
  --r: 16px;
  --header-h: 56px;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  font-size: 16px;
  line-height: 1.6;
  -webkit-tap-highlight-color: transparent;
}

/* ===== Header ===== */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--c-surface);
  border-bottom: 1px solid var(--c-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  z-index: 100;
}

#header-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--c-text);
  flex: 1;
  text-align: center;
}

.btn-icon {
  width: 40px;
  height: 40px;
  border: none;
  background: transparent;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--c-primary);
  transition: background .15s;
}
.btn-icon:active { background: var(--c-primary-light); }
.header-right { width: 40px; }

/* ===== Main ===== */
#main {
  margin-top: var(--header-h);
  min-height: calc(100vh - var(--header-h));
  position: relative;
}

/* ===== Views ===== */
.view {
  display: none;
  padding: 20px 16px 100px;
  animation: fadeIn .2s ease;
}
.view.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===== Home View ===== */
.home-hero {
  background: linear-gradient(135deg, var(--c-primary) 0%, #7c3aed 100%);
  color: white;
  border-radius: var(--r);
  padding: 28px 24px;
  text-align: center;
  margin-bottom: 24px;
}
.hero-badge {
  font-size: 40px;
  margin-bottom: 12px;
}
.home-hero h2 {
  font-size: 20px;
  font-weight: 800;
  line-height: 1.4;
  margin-bottom: 10px;
}
.hero-sub {
  font-size: 14px;
  opacity: .88;
  line-height: 1.6;
}

.module-list { display: flex; flex-direction: column; gap: 12px; }

.module-card {
  background: var(--c-surface);
  border-radius: var(--r);
  box-shadow: var(--shadow-sm);
  padding: 18px 16px;
  cursor: pointer;
  transition: transform .12s, box-shadow .12s;
  border: 2px solid transparent;
  display: flex;
  align-items: center;
  gap: 14px;
}
.module-card:active { transform: scale(.98); box-shadow: none; }
.module-card.completed { border-color: var(--c-success); }

.module-emoji {
  font-size: 32px;
  flex-shrink: 0;
  width: 52px;
  height: 52px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.module-card-body { flex: 1; min-width: 0; }
.module-card-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 3px;
}
.module-card-desc {
  font-size: 13px;
  color: var(--c-text-sub);
  margin-bottom: 8px;
}
.module-progress-bar {
  height: 5px;
  background: var(--c-border);
  border-radius: 10px;
  overflow: hidden;
}
.module-progress-fill {
  height: 100%;
  border-radius: 10px;
  background: var(--c-success);
  transition: width .4s ease;
}
.module-progress-label {
  font-size: 11px;
  color: var(--c-text-sub);
  margin-top: 3px;
  display: block;
}
.module-arrow {
  font-size: 18px;
  color: var(--c-text-sub);
}
.home-footer {
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: var(--c-text-sub);
}

/* Module accent colors */
.accent-0 .module-emoji { background: #ede9ff; }
.accent-1 .module-emoji { background: #fef3c7; }
.accent-2 .module-emoji { background: #d1fae5; }
.accent-3 .module-emoji { background: #dbeafe; }
.accent-4 .module-emoji { background: #fce7f3; }

.accent-0 .module-progress-fill { background: var(--c-primary); }
.accent-1 .module-progress-fill { background: var(--c-warning); }
.accent-2 .module-progress-fill { background: var(--c-success); }
.accent-3 .module-progress-fill { background: #3b82f6; }
.accent-4 .module-progress-fill { background: #ec4899; }

/* ===== Lesson List View ===== */
.module-header {
  background: var(--c-surface);
  border-radius: var(--r);
  padding: 20px;
  margin-bottom: 16px;
  text-align: center;
  box-shadow: var(--shadow-sm);
}
.module-header .m-emoji { font-size: 40px; margin-bottom: 8px; }
.module-header h2 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
.module-header p { font-size: 14px; color: var(--c-text-sub); }

.lesson-list { display: flex; flex-direction: column; gap: 10px; }

.lesson-item {
  background: var(--c-surface);
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--shadow-sm);
  transition: transform .12s;
  border: 2px solid transparent;
}
.lesson-item:active { transform: scale(.98); }
.lesson-item.done { border-color: var(--c-success); }
.lesson-item.locked { opacity: .45; cursor: not-allowed; }

.lesson-num {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--c-primary-light);
  color: var(--c-primary);
  font-weight: 800;
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.lesson-item.done .lesson-num {
  background: var(--c-success);
  color: white;
}
.lesson-item-title { font-size: 15px; font-weight: 600; }
.lesson-item-meta { font-size: 12px; color: var(--c-text-sub); margin-top: 2px; }
.lesson-check { margin-left: auto; font-size: 18px; }

.quiz-cta {
  margin-top: 20px;
  background: linear-gradient(135deg, var(--c-primary) 0%, #7c3aed 100%);
  border-radius: var(--r);
  padding: 24px;
  text-align: center;
  color: white;
}
.quiz-cta p { font-size: 15px; margin-bottom: 14px; line-height: 1.5; }

/* ===== Progress Bar ===== */
.progress-bar-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}
.progress-bar-bg {
  flex: 1;
  height: 6px;
  background: var(--c-border);
  border-radius: 10px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 10px;
  background: var(--c-primary);
  transition: width .4s ease;
}
.progress-label {
  font-size: 12px;
  color: var(--c-text-sub);
  white-space: nowrap;
}

/* ===== Lesson Content ===== */
.lesson-content {
  background: var(--c-surface);
  border-radius: var(--r);
  padding: 24px 20px;
  box-shadow: var(--shadow-sm);
  margin-bottom: 20px;
}
.lesson-content h3 {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 16px;
  color: var(--c-primary);
}
.lesson-content h4 {
  font-size: 16px;
  font-weight: 700;
  margin: 20px 0 8px;
  color: var(--c-text);
}
.lesson-content p {
  font-size: 15px;
  line-height: 1.75;
  margin-bottom: 14px;
  color: var(--c-text);
}
.lesson-content ul, .lesson-content ol {
  padding-left: 20px;
  margin-bottom: 14px;
}
.lesson-content li {
  font-size: 15px;
  line-height: 1.75;
  margin-bottom: 6px;
}
.lesson-content code {
  background: #f1f5f9;
  border-radius: 6px;
  padding: 2px 6px;
  font-family: 'Menlo', 'SF Mono', 'Consolas', monospace;
  font-size: 13px;
  color: #c0392b;
}
.lesson-content pre {
  background: #1e293b;
  border-radius: 10px;
  padding: 16px;
  overflow-x: auto;
  margin-bottom: 14px;
}
.lesson-content pre code {
  background: none;
  color: #e2e8f0;
  font-size: 13px;
  padding: 0;
}
.tip-box {
  background: var(--c-primary-light);
  border-left: 4px solid var(--c-primary);
  border-radius: 0 10px 10px 0;
  padding: 14px 16px;
  margin: 16px 0;
}
.tip-box .tip-label {
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--c-primary);
  margin-bottom: 6px;
}
.tip-box p { font-size: 14px; margin-bottom: 0; color: var(--c-primary); }

.warn-box {
  background: #fff7ed;
  border-left: 4px solid var(--c-warning);
  border-radius: 0 10px 10px 0;
  padding: 14px 16px;
  margin: 16px 0;
}
.warn-box .tip-label { color: var(--c-warning); }
.warn-box p { font-size: 14px; margin-bottom: 0; color: #92400e; }

.example-box {
  background: #f0fdf4;
  border: 1px solid #bbf7d0;
  border-radius: 10px;
  padding: 14px 16px;
  margin: 16px 0;
}
.example-box .tip-label { color: var(--c-success); }
.example-box p { font-size: 14px; margin-bottom: 0; color: #166534; }

.table-wrap { overflow-x: auto; margin-bottom: 14px; }
.lesson-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.lesson-table th {
  background: var(--c-primary);
  color: white;
  padding: 8px 10px;
  text-align: left;
}
.lesson-table td {
  border: 1px solid var(--c-border);
  padding: 8px 10px;
}
.lesson-table tr:nth-child(even) td { background: var(--c-bg); }

.lesson-nav {
  display: flex;
  gap: 12px;
}
.lesson-nav button { flex: 1; }

/* ===== Quiz View ===== */
.quiz-header { margin-bottom: 20px; }

.quiz-body {
  background: var(--c-surface);
  border-radius: var(--r);
  padding: 24px 20px;
  box-shadow: var(--shadow-sm);
  margin-bottom: 16px;
}

.quiz-question {
  font-size: 17px;
  font-weight: 700;
  line-height: 1.55;
  margin-bottom: 20px;
  color: var(--c-text);
}

.quiz-options { display: flex; flex-direction: column; gap: 10px; }

.quiz-option {
  border: 2px solid var(--c-border);
  border-radius: 12px;
  padding: 14px 16px;
  cursor: pointer;
  font-size: 15px;
  background: var(--c-surface);
  text-align: left;
  transition: border-color .15s, background .15s;
  display: flex;
  align-items: center;
  gap: 10px;
  line-height: 1.4;
}
.quiz-option:active:not(:disabled) { background: var(--c-primary-light); }
.quiz-option.selected { border-color: var(--c-primary); background: var(--c-primary-light); }
.quiz-option.correct { border-color: var(--c-success); background: #f0fdf4; }
.quiz-option.wrong { border-color: var(--c-error); background: #fef2f2; }
.quiz-option:disabled { cursor: default; }
.quiz-option-label {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--c-border);
  color: var(--c-text);
  font-weight: 800;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.quiz-option.correct .quiz-option-label { background: var(--c-success); color: white; }
.quiz-option.wrong .quiz-option-label { background: var(--c-error); color: white; }

.quiz-explanation {
  margin-top: 16px;
  padding: 14px 16px;
  border-radius: 10px;
  font-size: 14px;
  line-height: 1.65;
  display: none;
}
.quiz-explanation.show { display: block; }
.quiz-explanation.correct-exp {
  background: #f0fdf4;
  border: 1px solid #bbf7d0;
  color: #166534;
}
.quiz-explanation.wrong-exp {
  background: #fef2f2;
  border: 1px solid #fecaca;
  color: #991b1b;
}
.exp-label {
  font-weight: 800;
  font-size: 13px;
  margin-bottom: 6px;
  display: block;
}

.quiz-footer { text-align: center; }

/* ===== Result View ===== */
.result-wrap {
  text-align: center;
  padding-top: 20px;
}
.result-emoji { font-size: 64px; margin-bottom: 12px; }
.result-wrap h2 { font-size: 24px; font-weight: 800; margin-bottom: 16px; }
.result-score {
  background: var(--c-primary);
  color: white;
  border-radius: 20px;
  padding: 16px 24px;
  display: inline-block;
  font-size: 36px;
  font-weight: 900;
  margin-bottom: 16px;
  min-width: 140px;
}
.result-message {
  font-size: 15px;
  color: var(--c-text-sub);
  margin-bottom: 20px;
}

.result-answers {
  text-align: left;
  background: var(--c-surface);
  border-radius: var(--r);
  padding: 16px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
}
.result-answer-item {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  padding: 8px 0;
  border-bottom: 1px solid var(--c-border);
  font-size: 13px;
  line-height: 1.5;
}
.result-answer-item:last-child { border-bottom: none; }
.ans-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.ans-text { flex: 1; }
.ans-q { font-weight: 600; margin-bottom: 2px; }
.ans-detail { color: var(--c-text-sub); }

.result-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ===== Buttons ===== */
.btn-primary {
  background: var(--c-primary);
  color: white;
  border: none;
  border-radius: 14px;
  padding: 15px 24px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .15s, transform .12s;
  width: 100%;
}
.btn-primary:active { opacity: .85; transform: scale(.98); }
.btn-primary:disabled { opacity: .45; }

.btn-secondary {
  background: var(--c-surface);
  color: var(--c-primary);
  border: 2px solid var(--c-primary);
  border-radius: 14px;
  padding: 13px 24px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .15s, transform .12s;
  width: 100%;
}
.btn-secondary:active { opacity: .75; transform: scale(.98); }

/* ===== Name Entry View ===== */
.name-entry-wrap {
  max-width: 360px;
  margin: 40px auto 0;
  text-align: center;
  padding: 0 8px;
}
.name-entry-wrap .hero-badge { font-size: 52px; margin-bottom: 16px; }
.name-entry-wrap h2 { font-size: 24px; font-weight: 800; margin-bottom: 10px; }
.name-entry-wrap .hero-sub { font-size: 15px; color: var(--c-text-sub); margin-bottom: 28px; }

.name-input {
  width: 100%;
  border: 2px solid var(--c-border);
  border-radius: 14px;
  padding: 16px 18px;
  font-size: 17px;
  outline: none;
  transition: border-color .2s;
  margin-bottom: 12px;
  font-family: inherit;
}
.name-input:focus { border-color: var(--c-primary); }

.name-loading {
  font-size: 14px;
  color: var(--c-text-sub);
  margin-bottom: 12px;
  padding: 8px;
}

.name-note {
  font-size: 12px;
  color: var(--c-text-sub);
  margin-top: 14px;
  line-height: 1.6;
}

/* 名前バッジ（ヘッダー右） */
.user-badge {
  font-size: 12px;
  font-weight: 700;
  color: var(--c-primary);
  background: var(--c-primary-light);
  border-radius: 20px;
  padding: 4px 10px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 80px;
  cursor: pointer;
}

/* ===== Safe area for notch devices ===== */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .view { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
}

/* ===== Tablet/Desktop ===== */
@media (min-width: 640px) {
  #main { max-width: 480px; margin-left: auto; margin-right: auto; }
  #header { max-width: 480px; left: 50%; transform: translateX(-50%); }
}
  </style>
</head>
<body>
  <div id="app">
    <header id="header">
      <button id="btn-back" class="btn-icon" style="visibility:hidden">&#8592;</button>
      <span id="header-title">Claude Code 学習</span>
      <div class="header-right"></div>
    </header>

    <main id="main">
      <!-- 名前入力画面 -->
      <div id="view-name-entry" class="view">
        <div class="name-entry-wrap">
          <div class="hero-badge">📝</div>
          <h2>はじめに</h2>
          <p class="hero-sub">あなたの名前を入力してください。<br>進捗の保存・管理に使用されます。</p>
          <input type="text" id="input-name" class="name-input" placeholder="例：田中 太郎" maxlength="20" autocomplete="off">
          <div id="name-loading" class="name-loading" style="display:none">進捗を読み込み中…</div>
          <button id="btn-name-submit" class="btn-primary">はじめる →</button>
          <p class="name-note">※ 既に学習中の方は同じ名前を入力すると進捗が引き継がれます</p>
        </div>
      </div>

      <!-- ホーム画面 -->
      <div id="view-home" class="view active">
        <div class="home-hero">
          <div class="hero-badge">🚀</div>
          <h2>非エンジニアのための<br>Claude Code 完全攻略</h2>
          <p class="hero-sub">隙間時間に読んで問題を解いて<br>Claude Codeを使い倒そう</p>
        </div>
        <div id="module-list" class="module-list"></div>
        <div class="home-footer">
          <p>各モジュールは <strong>5〜10分</strong> で読めます</p>
        </div>
      </div>

      <!-- レッスンリスト -->
      <div id="view-lesson-list" class="view">
        <div id="lesson-list-header" class="module-header"></div>
        <div id="lesson-list" class="lesson-list"></div>
        <div class="quiz-cta" id="quiz-cta" style="display:none">
          <p>レッスンをすべて読んだら<br>クイズに挑戦しよう！</p>
          <button id="btn-start-quiz" class="btn-primary">クイズに挑戦する →</button>
        </div>
      </div>

      <!-- レッスン本文 -->
      <div id="view-lesson" class="view">
        <div class="progress-bar-wrap">
          <div class="progress-bar-bg">
            <div id="lesson-progress-fill" class="progress-bar-fill"></div>
          </div>
          <span id="lesson-progress-label" class="progress-label"></span>
        </div>
        <div id="lesson-content" class="lesson-content"></div>
        <div class="lesson-nav">
          <button id="btn-prev-lesson" class="btn-secondary">← 前へ</button>
          <button id="btn-next-lesson" class="btn-primary">次へ →</button>
        </div>
      </div>

      <!-- クイズ -->
      <div id="view-quiz" class="view">
        <div class="quiz-header">
          <div class="progress-bar-bg">
            <div id="quiz-progress-fill" class="progress-bar-fill"></div>
          </div>
          <span id="quiz-progress-label" class="progress-label"></span>
        </div>
        <div class="quiz-body">
          <div id="quiz-question" class="quiz-question"></div>
          <div id="quiz-options" class="quiz-options"></div>
          <div id="quiz-explanation" class="quiz-explanation"></div>
        </div>
        <div class="quiz-footer">
          <button id="btn-quiz-next" class="btn-primary" style="display:none">次の問題 →</button>
        </div>
      </div>

      <!-- 結果画面 -->
      <div id="view-result" class="view">
        <div class="result-wrap">
          <div id="result-emoji" class="result-emoji">🎉</div>
          <h2 id="result-title">クイズ完了！</h2>
          <div id="result-score" class="result-score"></div>
          <p id="result-message" class="result-message"></p>
          <div class="result-answers" id="result-answers"></div>
          <div class="result-actions">
            <button id="btn-retry" class="btn-secondary">もう一度挑戦</button>
            <button id="btn-home" class="btn-primary">ホームに戻る</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
/* Module 1: Claude Codeとは何か */
const MODULE1 = {
  id: 'm1', title: 'Claude Codeとは何か', emoji: '🤖',
  desc: 'AIエージェントの基本と可能性を理解しよう',
  lessons: [
    {
      id: 'm1-l1', title: 'Claude Codeの概要',
      readMin: 4,

      options: ['諦めて次の問題に進む', '答えを見て丸暗記する', 'Claudeに「ヒントをください（答えは言わないで）」と聞く', '1時間以上悩み続ける'],
      correct: 2,
      exp: 'すぐClaudeにヒントを求めることが挫折防止の最大の鍵です。「答えは言わないで」と添えることで考える力も養えます。丸暗記より思考プロセスが大切です。'
    },
    {
      q: 'Claude Codeを「使い倒す」状態として正しいのはどれですか？',
      options: ['「Claudeに全部任せて何もしない」状態', '「Claudeを的確に指示してコントロールする」状態', '「コマンドを全部暗記した」状態', '「Claudeなしでもコードが書ける」状態'],
      correct: 1,
      exp: 'DSAとGitHubを学ぶ目的は「Claudeに丸投げ」ではなく「Claudeを的確に指示してコントロールする」ことです。知識があると指示が的確になり、生成コードを理解・改善できます。'
    },
    {
      q: '次の指示の中で、DSAの知識を活かした最も優れたプロンプトはどれですか？',
      options: ['「名前から情報を取り出せるようにして」', '「辞書を使ってください」', '「ハッシュテーブルを使って名前からO(1)で情報を取り出せるようにして」', '「なるべく速くして」'],
      correct: 2,
      exp: 'データ構造（ハッシュテーブル）と計算量（O(1)）を明示したプロンプトが最も具体的です。Claudeが意図を正確に理解し、最適なコードを一発で生成できます。'
    }
  ]
};
/* content.js — モジュールをまとめて COURSES 配列に */
/* 各モジュールファイル（module1〜5.js）が先に読み込まれている前提 */
const COURSES = [MODULE1, MODULE2, MODULE3, MODULE4, MODULE5];
/* app.js — SPA ルーティング・クイズロジック・進捗管理 */

// ===== GAS設定 =====
// デプロイ後にURLをここに貼り付けてbundle.htmlを再生成してください
const GAS_URL = 'https://script.google.com/macros/s/AKfycbziPlC4bmzepGUhmho5NCNiLvv_dGxA42jRjTEEuZze083aHDn3RxNx1bmEfQEiIA1J/exec';

const STORAGE_KEY = 'ccl_progress_v1';
const USERNAME_KEY = 'ccl_username';

// ===== State =====
let state = {
  currentModule: null,
  currentLessonIdx: 0,
  quizAnswers: [],
  quizCurrentIdx: 0,
};

// ===== Username helpers =====
function getUsername() {
  return localStorage.getItem(USERNAME_KEY) || '';
}
function setUsername(name) {
  localStorage.setItem(USERNAME_KEY, name.trim());
}

// ===== GAS sync =====
function syncToGAS(moduleId, action, value) {
  const name = getUsername();
  if (!name || GAS_URL.startsWith('REPLACE')) return;
  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ name, moduleId, action, value }),
  }).catch(() => {}); // fire-and-forget
}

async function fetchProgressFromGAS(name) {
  if (GAS_URL.startsWith('REPLACE')) return null;
  try {
    const res = await fetch(`${GAS_URL}?name=${encodeURIComponent(name)}`, { redirect: 'follow' });
    const data = await res.json();
    if (data.error) return null;
    return data;
  } catch {
    return null;
  }
}

// ===== Progress helpers =====
function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveProgress(p) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
}
function mergeProgress(local, remote) {
  if (!remote) return local;
  const merged = { ...local };
  for (const [moduleId, rp] of Object.entries(remote)) {
    if (!merged[moduleId]) merged[moduleId] = { lessons: [], quizScore: null };
    const allLessons = new Set([...merged[moduleId].lessons, ...(rp.lessons || [])]);
    merged[moduleId].lessons = [...allLessons];
    if (rp.quizScore && !merged[moduleId].quizScore) {
      merged[moduleId].quizScore = rp.quizScore;
    }
  }
  return merged;
}
function markLessonDone(moduleId, lessonId) {
  const p = loadProgress();
  if (!p[moduleId]) p[moduleId] = { lessons: [], quizScore: null };
  if (!p[moduleId].lessons.includes(lessonId)) {
    p[moduleId].lessons.push(lessonId);
    syncToGAS(moduleId, 'lesson', lessonId);
  }
  saveProgress(p);
}
function saveQuizScore(moduleId, score, total) {
  const p = loadProgress();
  if (!p[moduleId]) p[moduleId] = { lessons: [], quizScore: null };
  p[moduleId].quizScore = { score, total };
  saveProgress(p);
  syncToGAS(moduleId, 'quiz', `${score}/${total}`);
}
function getModuleProgress(moduleId) {
  const p = loadProgress();
  return p[moduleId] || { lessons: [], quizScore: null };
}

// ===== View switching =====
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function setHeader(title, showBack) {
  document.getElementById('header-title').textContent = title;
  document.getElementById('btn-back').style.visibility = showBack ? 'visible' : 'hidden';
  renderUserBadge();
}
function renderUserBadge() {
  const name = getUsername();
  const right = document.querySelector('.header-right');
  if (name) {
    right.innerHTML = `<span class="user-badge" onclick="confirmChangeName()" title="名前を変更">${name}</span>`;
  } else {
    right.innerHTML = '';
  }
}
function confirmChangeName() {
  if (confirm('名前を変更しますか？\n変更するとローカルの進捗はリセットされます。')) {
    localStorage.removeItem(USERNAME_KEY);
    localStorage.removeItem(STORAGE_KEY);
    renderNameEntry();
  }
}

// ===== Name Entry =====
function renderNameEntry() {
  setHeader('Claude Code 学習', false);
  showView('view-name-entry');
  const input = document.getElementById('input-name');
  input.value = '';
  input.focus();

  document.getElementById('btn-name-submit').onclick = async () => {
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    setUsername(name);

    const loading = document.getElementById('name-loading');
    const btn = document.getElementById('btn-name-submit');
    loading.style.display = 'block';
    btn.disabled = true;

    const remote = await fetchProgressFromGAS(name);
    if (remote) {
      const merged = mergeProgress(loadProgress(), remote);
      saveProgress(merged);
    }

    loading.style.display = 'none';
    btn.disabled = false;
    renderHome();
  };

  input.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('btn-name-submit').click(); });
}

// ===== Home =====
function renderHome() {
  setHeader('Claude Code 学習', false);
  showView('view-home');
  const container = document.getElementById('module-list');
  const progress = loadProgress();
  container.innerHTML = COURSES.map((m, i) => {
    const mp = progress[m.id] || { lessons: [], quizScore: null };
    const total = m.lessons.length;
    const done = mp.lessons.length;
    const pct = total ? Math.round(done / total * 100) : 0;
    const quizDone = mp.quizScore ? ` • クイズ ${mp.quizScore.score}/${mp.quizScore.total}点` : '';
    return `
<div class="module-card accent-${i}" onclick="openModule('${m.id}')">
  <div class="module-emoji">${m.emoji}</div>
  <div class="module-card-body">
    <div class="module-card-title">${m.title}</div>
    <div class="module-card-desc">${m.desc}</div>
    <div class="module-progress-bar"><div class="module-progress-fill" style="width:${pct}%"></div></div>
    <span class="module-progress-label">${done}/${total} レッスン完了${quizDone}</span>
  </div>
  <div class="module-arrow">›</div>
</div>`;
  }).join('');
}

// ===== Lesson List =====
function openModule(moduleId) {
  const m = COURSES.find(c => c.id === moduleId);
  if (!m) return;
  state.currentModule = m;
  renderLessonList(m);
}
function renderLessonList(m) {
  setHeader(m.title, true);
  document.getElementById('btn-back').onclick = renderHome;
  showView('view-lesson-list');
  document.getElementById('lesson-list-header').innerHTML = `
<div class="m-emoji">${m.emoji}</div>
<h2>${m.title}</h2>
<p>${m.desc}</p>`;
  const mp = getModuleProgress(m.id);
  const list = document.getElementById('lesson-list');
  list.innerHTML = m.lessons.map((l, i) => {
    const done = mp.lessons.includes(l.id);
    return `
<div class="lesson-item ${done ? 'done' : ''}" onclick="openLesson(${i})">
  <div class="lesson-num">${done ? '✓' : i + 1}</div>
  <div>
    <div class="lesson-item-title">${l.title}</div>
    <div class="lesson-item-meta">約${l.readMin}分</div>
  </div>
  <div class="lesson-check">${done ? '✅' : '›'}</div>
</div>`;
  }).join('');
  const allDone = m.lessons.every(l => mp.lessons.includes(l.id));
  const cta = document.getElementById('quiz-cta');
  cta.style.display = allDone ? 'block' : 'none';
  document.getElementById('btn-start-quiz').onclick = () => startQuiz(m);
}

// ===== Lesson =====
function openLesson(idx) {
  state.currentLessonIdx = idx;
  renderLesson();
}
function renderLesson() {
  const m = state.currentModule;
  const lesson = m.lessons[state.currentLessonIdx];
  const total = m.lessons.length;
  const idx = state.currentLessonIdx;
  setHeader(lesson.title, true);
  document.getElementById('btn-back').onclick = () => renderLessonList(m);
  showView('view-lesson');
  const pct = Math.round((idx + 1) / total * 100);
  document.getElementById('lesson-progress-fill').style.width = pct + '%';
  document.getElementById('lesson-progress-label').textContent = `${idx + 1} / ${total}`;
  document.getElementById('lesson-content').innerHTML = lesson.html;
  markLessonDone(m.id, lesson.id);
  const mp = getModuleProgress(m.id);
  const allDone = m.lessons.every(l => mp.lessons.includes(l.id));
  const prevBtn = document.getElementById('btn-prev-lesson');
  const nextBtn = document.getElementById('btn-next-lesson');
  prevBtn.style.visibility = idx > 0 ? 'visible' : 'hidden';
  prevBtn.onclick = () => { state.currentLessonIdx--; renderLesson(); window.scrollTo(0, 0); };
  if (idx < total - 1) {
    nextBtn.textContent = '次へ →';
    nextBtn.onclick = () => { state.currentLessonIdx++; renderLesson(); window.scrollTo(0, 0); };
  } else if (allDone) {
    nextBtn.textContent = 'クイズへ →';
    nextBtn.onclick = () => startQuiz(m);
  } else {
    nextBtn.textContent = '一覧へ戻る';
    nextBtn.onclick = () => renderLessonList(m);
  }
}

// ===== Quiz =====
function startQuiz(m) {
  state.currentModule = m;
  state.quizAnswers = [];
  state.quizCurrentIdx = 0;
  renderQuizQuestion();
}
function renderQuizQuestion() {
  const m = state.currentModule;
  const questions = m.quiz;
  const idx = state.quizCurrentIdx;
  const q = questions[idx];
  setHeader('クイズ', true);
  document.getElementById('btn-back').onclick = () => renderLessonList(m);
  showView('view-quiz');
  const pct = Math.round((idx / questions.length) * 100);
  document.getElementById('quiz-progress-fill').style.width = pct + '%';
  document.getElementById('quiz-progress-label').textContent = `${idx + 1} / ${questions.length}`;
  document.getElementById('quiz-question').textContent = `Q${idx + 1}. ${q.q}`;
  const labels = ['A', 'B', 'C', 'D'];
  document.getElementById('quiz-options').innerHTML = q.options.map((opt, i) => `
<button class="quiz-option" onclick="answerQuiz(${i})" id="opt-${i}">
  <span class="quiz-option-label">${labels[i]}</span>${opt}
</button>`).join('');
  const expEl = document.getElementById('quiz-explanation');
  expEl.className = 'quiz-explanation';
  expEl.textContent = '';
  const nextBtn = document.getElementById('btn-quiz-next');
  nextBtn.style.display = 'none';
}
function answerQuiz(selectedIdx) {
  const m = state.currentModule;
  const q = m.quiz[state.quizCurrentIdx];
  const isCorrect = selectedIdx === q.correct;
  document.querySelectorAll('.quiz-option').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    else if (i === selectedIdx && !isCorrect) btn.classList.add('wrong');
  });
  const expEl = document.getElementById('quiz-explanation');
  expEl.className = `quiz-explanation show ${isCorrect ? 'correct-exp' : 'wrong-exp'}`;
  expEl.innerHTML = `<span class="exp-label">${isCorrect ? '✅ 正解！' : '❌ 不正解'}</span>${q.exp}`;
  state.quizAnswers.push({ correct: isCorrect, selected: selectedIdx, answer: q.correct });
  const nextBtn = document.getElementById('btn-quiz-next');
  nextBtn.style.display = 'block';
  const isLast = state.quizCurrentIdx >= m.quiz.length - 1;
  nextBtn.textContent = isLast ? '結果を見る →' : '次の問題 →';
  nextBtn.onclick = isLast ? showResult : () => { state.quizCurrentIdx++; renderQuizQuestion(); window.scrollTo(0, 0); };
}

// ===== Result =====
function showResult() {
  const m = state.currentModule;
  const score = state.quizAnswers.filter(a => a.correct).length;
  const total = m.quiz.length;
  const pct = Math.round(score / total * 100);
  saveQuizScore(m.id, score, total);
  setHeader('クイズ結果', true);
  document.getElementById('btn-back').onclick = () => renderLessonList(m);
  showView('view-result');
  let emoji = '😢', msg = 'もう一度チャレンジしてみましょう！';
  if (pct === 100) { emoji = '🎉'; msg = '完璧です！全問正解素晴らしい！'; }
  else if (pct >= 70) { emoji = '😊'; msg = 'よくできました！もう少しで完璧です。'; }
  else if (pct >= 50) { emoji = '🤔'; msg = 'レッスンをもう一度読んでみましょう。'; }
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = pct === 100 ? '全問正解！' : 'クイズ完了！';
  document.getElementById('result-score').textContent = `${score} / ${total}`;
  document.getElementById('result-message').textContent = msg;
  const labels = ['A', 'B', 'C', 'D'];
  document.getElementById('result-answers').innerHTML = state.quizAnswers.map((a, i) => {
    const q = m.quiz[i];
    return `
<div class="result-answer-item">
  <span class="ans-icon">${a.correct ? '✅' : '❌'}</span>
  <div class="ans-text">
    <div class="ans-q">Q${i + 1}. ${q.q.substring(0, 40)}${q.q.length > 40 ? '…' : ''}</div>
    ${!a.correct ? `<div class="ans-detail">正解: ${labels[q.correct]}. ${q.options[q.correct]}</div>` : ''}
  </div>
</div>`;
  }).join('');
  document.getElementById('btn-retry').onclick = () => startQuiz(m);
  document.getElementById('btn-home').onclick = renderHome;
}

// ===== Init =====
document.addEventListener('DOMContentLoaded', () => {
  if (getUsername()) {
    renderHome();
  } else {
    renderNameEntry();
  }
});
  </script>
